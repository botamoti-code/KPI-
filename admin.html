<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI管理ツール - 管理者設定</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(178, 45, 53, 0.08);
            border: 2px solid #fbe6ea;
            position: relative;
        }

        .share-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #fce8eb;
            border-radius: 8px;
            border: 1px dashed #f7d2d9;
            word-break: break-all;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="background-texture"></div>

    <div class="admin-container">
        <header>
            <h1 class="title">🔧 管理者用設定</h1>
            <p class="subtitle">クライアントに配布する「自動設定付きの専用URL」を作成します。</p>
        </header>

        <div class="settings-card" style="margin-top: 30px;">
            <h3 style="color: var(--primary-color);">📌 Google Apps Script Webhook URL</h3>
            <p style="font-size: 0.9rem; color: #666;">デプロイして発行されたWebhookのURLをここに貼り付けてください。</p>
            <input type="text" id="admin-webhook-url" class="settings-input" placeholder="https://script.google.com/macros/s/.../exec">
            
            <button id="generate-btn" class="primary-btn bouncy-btn" style="width: 100%; padding: 15px; margin-top: 20px; font-size: 1.1rem;">🔗 クライアント招待用URLを生成・コピー</button>
        </div>

        <div id="share-area" style="display: none;">
            <h3 style="margin-top:30px; color: var(--text-color);">✅ 生成された招待用URL</h3>
            <p style="font-size: 0.85rem; color: #666;">このURLをコピーして、クライアントにLINE等でお渡しください。クライアントがこのリンクを開くと自動的に設定が完了します。</p>
            <div class="share-box" id="share-url-text"></div>
            <p style="text-align: center; font-size: 0.85rem; color: #888;">
                <a href="index.html" style="color: var(--primary-color);">▶︎ 一般用画面（index.html）へ戻る</a>
            </p>
        </div>
    </div>

    <div id="toast" class="toast">コピーしました！</div>

    <script>
        const webhookInput = document.getElementById('admin-webhook-url');
        const generateBtn = document.getElementById('generate-btn');
        const shareArea = document.getElementById('share-area');
        const shareUrlText = document.getElementById('share-url-text');
        const toast = document.getElementById('toast');

        // トースト表示
        function displayToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 保存されたURLがあれば表示
        const SETTINGS_KEY = 'wafu_kpi_settings_v1';
        const stored = localStorage.getItem(SETTINGS_KEY);
        if (stored) {
            try {
                const settings = JSON.parse(stored);
                if (settings.webhookUrl) {
                    webhookInput.value = settings.webhookUrl;
                }
            } catch (e) {}
        }

        generateBtn.addEventListener('click', () => {
            const hookUrl = webhookInput.value.trim();
            if (!hookUrl) {
                alert('Webhook URLを入力してください。');
                return;
            }

            // 自身のURLベースを取得して、index.html のパラメータ付きURLを生成する
            let baseUrl = window.location.href;
            // admin.html を削るか、ドメインだけにする
            baseUrl = baseUrl.replace(/admin\.html.*$/, 'index.html');
            if (!baseUrl.includes('index.html')) {
                // ローカルやディレクトリ表示の場合の保険
                baseUrl = window.location.protocol + "//" + window.location.host + window.location.pathname.replace(/\/$/, '') + '/index.html';
            }

            const inviteUrl = `${baseUrl}?hook=${encodeURIComponent(hookUrl)}`;

            // UIに表示
            shareUrlText.textContent = inviteUrl;
            shareArea.style.display = 'block';

            // クリップボードにコピー
            navigator.clipboard.writeText(inviteUrl).then(() => {
                displayToast('招待用URLをコピーしました！');
            }).catch(err => {
                console.error('コピー失敗', err);
                displayToast('コピーに失敗しました。手動でコピーしてください。');
            });
            
            // ついでに管理者のブラウザにも設定を保存しておく
            let appSettings = { clientName: '', webhookUrl: hookUrl, currentGoal: '' };
            if (stored) {
                try {
                    appSettings = { ...JSON.parse(stored), webhookUrl: hookUrl };
                } catch(e) {}
            }
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(appSettings));
        });
    </script>
</body>
</html>
